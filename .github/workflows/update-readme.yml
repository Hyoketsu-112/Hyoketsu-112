name: 🔄 Auto-Update Profile README

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
  push:
    branches:
      - main

jobs:
  update-readme:
    name: Update Profile README
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the repo ──────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      # ── 2. Update GitHub Snake Animation ─────────────────────────────────
      - name: 🐍 Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # ── 3. Push snake SVG to output branch ───────────────────────────────
      - name: 🚀 Push Snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Update README stats via readme-stats (optional waka/metrics) ──
      - name: 📊 Fetch Latest GitHub Stats (cache bust)
        run: |
          echo "Stats are live via dynamic badge URLs — no static fetch needed."
          echo "All stats, streaks, and graphs auto-refresh via their hosted APIs."

      # ── 5. Commit any README changes if script modifies it ────────────────
      - name: 💾 Commit README changes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 🤖 auto-update profile README [skip ci]"
          file_pattern: README.md
